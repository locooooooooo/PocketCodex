import com.google.protobuf.gradle.*

plugins {
    id "com.google.protobuf" version "0.9.4"
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Add rustls-platform-verifier Android support without invoking cargo during Gradle configuration.
String findRustlsPlatformVerifierMavenDir() {
    def configuredDir = System.getenv("RUSTLS_PLATFORM_VERIFIER_MAVEN_DIR")
    if (configuredDir != null && !configuredDir.trim().isEmpty()) {
        def mavenDir = file(configuredDir)
        if (!mavenDir.exists()) {
            throw new GradleException("Configured rustls-platform-verifier maven directory does not exist: ${mavenDir.path}")
        }
        println("Found rustls-platform-verifier maven repo from environment: ${mavenDir.path}")
        return mavenDir.path
    }

    def cargoHome = System.getenv("CARGO_HOME")
    def registrySrcDir = cargoHome != null && !cargoHome.trim().isEmpty() ?
        new File(cargoHome, "registry/src") :
        new File(System.getProperty("user.home"), ".cargo/registry/src")
    def candidates = []

    if (registrySrcDir.exists()) {
        registrySrcDir.eachDir { registryDir ->
            registryDir.eachDirMatch(~/rustls-platform-verifier-android-.+/) { pkgDir ->
                def mavenDir = new File(pkgDir, "maven")
                if (mavenDir.exists()) {
                    candidates << mavenDir
                }
            }
        }
    }

    if (candidates.isEmpty()) {
        throw new GradleException("rustls-platform-verifier-android maven directory was not found under ${registrySrcDir.path}")
    }

    def preferredDir = candidates.find { it.path.contains("index.crates.io") } ?: candidates.sort { a, b -> a.path <=> b.path }.first()
    println("Found rustls-platform-verifier maven repo from cargo registry: ${preferredDir.path}")
    return preferredDir.path
}

repositories {
    maven {
        url = findRustlsPlatformVerifierMavenDir()
        metadataSources.artifact()
    }
}

protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:3.20.1'
    }

    generateProtoTasks {
        all().configureEach { task ->
            task.builtins {
                java {
                    option "lite"
                }
            }
        }
    }
}

android {
    compileSdkVersion 34
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'

        main.proto.srcDirs += '../../../libs/hbb_common/protos'
        main.proto.includes += "message.proto"
    }

    compileOptions {
        targetCompatibility JavaVersion.VERSION_1_8
        sourceCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.carriez.flutter_hbb"
        minSdkVersion 22
        targetSdkVersion 33
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
      release {
        keyAlias keystoreProperties['keyAlias']
        keyPassword keystoreProperties['keyPassword']
        storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
        storePassword keystoreProperties['storePassword']
      }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'com.google.protobuf:protobuf-javalite:3.20.1'
    implementation "androidx.media:media:1.6.0"
    implementation 'com.github.getActivity:XXPermissions:18.5'
    implementation("org.jetbrains.kotlin:kotlin-stdlib") { version { strictly("1.9.10") } }
    implementation 'com.caverock:androidsvg-aar:1.4'
    implementation "rustls:rustls-platform-verifier:0.1.1"
}
